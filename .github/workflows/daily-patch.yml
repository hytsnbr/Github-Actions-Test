name: Daily Patch Release
on:
  schedule:
    - cron: '0 21 * * *' # UTC 21:00 = JST 06:00
  workflow_dispatch:

jobs:
  patch-tagging:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          fetch-tags: true
          # 次のWorkflowを起動させるため、PAT（個人アクセストークン）を推奨
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Check for changes since last tag
        id: check_changes
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          COMMITS_COUNT=$(git rev-list $LATEST_TAG..main --count)
          echo "count=$COMMITS_COUNT" >> $GITHUB_OUTPUT

      - name: Bump version and push tag
        if: steps.check_changes.outputs.count > 0
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r major minor patch <<< "$VERSION"
          NEW_TAG="v$major.$minor.$((patch + 1))"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $NEW_TAG
          git push origin $NEW_TAG
