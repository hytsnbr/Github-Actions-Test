name: "Lint PR Title"

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

permissions:
  pull-requests: write

jobs:
  main:
    name: Validate PR Title
    runs-on: ubuntu-latest
    
    steps:
      - name: lint pr title
        uses: amannn/action-semantic-pull-request@ac7e3fc035c47465748bbcb1a822c1583cf79bbc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 許可するタイプを明示（release.yml のカテゴリと合わせる）
          types: |
            feat
            fix
            chore
            refactor
            perf
            style
            docs
            test
            ci
          # スコープ（例: feat(auth): ...）の入力を必須にする場合は true
          requireScope: false
      
      - name: post comment on failure
        if: failure()
        uses: marocchino/sticky-pull-request-comment@5a61de79c6a3f3f961d6e3ceea2efe7b4cd01f32
        with:
          header: pr-title-lint-error
          message: |
            ### ❌ PRタイトルの形式が正しくありません
            
            リリースノートの自動生成を正しく行うため、[Conventional Commits](https://www.conventionalcommits.org/ja/v1.0.0/) に準拠したタイトルに変更してください。
            
            **例:**
            - `feat: ユーザーログイン機能の追加`
            - `fix: 認証エラーの修正`
            - `docs: READMEの更新`
            
            **現在のタイトル:** `${{ github.event.pull_request.title }}`

      - name: Delete Comment on Success
        if: success()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-title-lint-error
          delete: true
