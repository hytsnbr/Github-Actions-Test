name: PR Comment Command

on:
  issue_comment:
    types:
      - created
      - edited

env:
  GH_TOKEN: ${{ github.token }}
  PR_NUMBER: ${{ github.event.issue.number }}

  COMMAND_LIST: |
    "/close"
    "/reopen"

jobs:
  pr_close:
    if: contains(github.event.comment.html_url, '/pull/') && startsWith(github.event.comment.body , '/close')

    runs-on: ubuntu-latest

    steps:
      - name: Get Branch Name
        uses: xt0rted/pull-request-comment-branch@e8b8daa837e8ea7331c0003c9c316a64c6d8b0b1
        id: get-branch-name
        with:
          repo_token: ${{ env.GH_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.get-branch-name.outputs.head_ref }}

      - name: close
        run: |
          gh pr close ${{env.PR_NUMBER}} \
          --comment "$MESSAGE"
        env:
          MESSAGE: |
            プルリクエストをクローズします
            再オープン：/reopen

  pr_reopen:
    if: contains(github.event.comment.html_url, '/pull/') && startsWith(github.event.comment.body , '/reopen')

    runs-on: ubuntu-latest

    steps:
      - name: Get Branch Name
        uses: xt0rted/pull-request-comment-branch@e8b8daa837e8ea7331c0003c9c316a64c6d8b0b1
        id: get-branch-name
        with:
          repo_token: ${{ env.GH_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.get-branch-name.outputs.head_ref }}

      - name: reopen
        run: |
          gh pr reopen ${{env.PR_NUMBER}} \
          --comment "$MESSAGE"
        env:
          MESSAGE: |
            プルリクエストを再オープンします

  test:
    runs-on: ubuntu-latest

    steps:
      - name: test
        run: |
          echo ${{env.COMMAND_LIST}}
