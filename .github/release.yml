# .github/release.yml
changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - github-actions[bot]
  
  categories:
    - title: "🚀 新機能"
      title_prefixes:
        - "feat:"
        - "feature:"
    
    - title: "🐛 バグ修正"
      title_prefixes:
        - "fix:"
    
    - title: "🧰 メンテナンス&リファクタリング"
      title_prefixes:
        - "chore:"
        - "refactor:"
        - "perf:"
        - "style:"
    
    - title: "📝 ドキュメント関連"
      title_prefixes:
        - "docs:"
    
    - title: "🧪 テスト関連"
      title_prefixes:
        - "test:"
    
    - title: "⚙️ CI/CD"
      title_prefixes:
        - "ci:"

  # 分類に当てはまらないものは「Other Changes」としてまとめる
  default_category: "📦 その他変更"
